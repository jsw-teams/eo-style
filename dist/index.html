<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>静态库镜像</title>
  <meta name="description" content="前端静态库镜像站">
  <meta name="keywords" content="CSS, JavaScript, 静态库, 镜像站">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand" id="brand" href="/">静态库镜像</a>
      <a class="action-btn" id="formLink" href="#" target="_blank" rel="noopener">提交收录申请</a>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="search-wrap">
        <label class="sr-only" for="searchInput">搜索库</label>
        <input id="searchInput" type="search" placeholder="搜索库名、关键词">
      </div>
      <div id="searchResults" class="card-grid"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>热门库</h2>
      </div>
      <div id="featuredLibraries" class="card-grid"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>全部库</h2>
      </div>
      <div id="allLibraryList" class="card-grid"></div>
    </section>
  </main>

  <script src="/assets/app.js" defer></script>
</body>
</html>
